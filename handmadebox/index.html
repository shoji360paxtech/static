<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAS Iframe Fullscreen</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* スクロールバーを隠す */
        }
        .full-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;  /* ビューポートの幅 */
            height: 100vh; /* ビューポートの高さ */
            border: none;
        }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/a/macros/paxtech.one/s/AKfycby3zalhP_tAPDwZOKtBKdxQUdl7ZueFZgG13_rmhJNTutCYRBB_VuV275S7bQGx2CJOGw/exec" class="full-iframe" allow="camera;microphone"></iframe>
</body>
</html>
